{% extends "base.html" %}
{% block content %}
  <section>
    <article>
      <header class="major">
        <h2>{{ page.title }}</h2>
      </header>
      {% if page.date %}
      <p><small>{{ page.date | date(format="%B %e, %Y") }}</small></p>
      {% endif %}
      {{ page.content | safe }}
    </article>
  </section>
{% endblock content %}
